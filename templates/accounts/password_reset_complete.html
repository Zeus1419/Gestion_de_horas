{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Restablecida - Sistema de Gestión de Horas</title>
    <meta name="description"
        content="Contraseña restablecida exitosamente - Corporación Universitaria Autónoma del Cauca">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="login-wrapper">
        <!-- LEFT SIDE -->
        <div class="login-left">
            <h1>CORPORACIÓN UNIVERSITARIA<br>AUTÓNOMA DEL CAUCA</h1>
            <div class="login-image-card">
                <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=600&h=400&fit=crop"
                    alt="Equipo de trabajo universitario">
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="login-right">
            <div class="login-logo">
                <img src="{% static 'img/logo_white.png' %}" alt="Uniautónoma del Cauca">
            </div>

            <div class="reset-status-icon">
                <svg viewBox="0 0 24 24" width="80" height="80" fill="none" stroke="#4caf50" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="8,12 11,15 16,9" />
                </svg>
            </div>

            <h2>¡CONTRASEÑA RESTABLECIDA!</h2>
            <p style="max-width:400px;text-align:center;line-height:1.6;opacity:0.9;">
                Su contraseña ha sido actualizada exitosamente.
                Ya puede iniciar sesión con su nueva contraseña.
            </p>

            <a href="{% url 'login' %}" class="btn-login"
                style="display:inline-block;width:auto;padding:14px 50px;margin-top:25px;text-decoration:none;">
                INICIAR SESIÓN
            </a>
        </div>
    </div>
</body>

</html>
